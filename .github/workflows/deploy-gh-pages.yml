name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp index.html _deploy/
          cp og-preview.png _deploy/ 2>/dev/null || true
          cp icon-512.png _deploy/
          cp site.webmanifest _deploy/
          cp sw.js _deploy/
          cp -r stars/ _deploy/
          touch _deploy/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          force_orphan: false
          commit_message: 'deploy: auto-deploy from main'

      - name: Notify success
        run: |
          echo "::notice::Deployed to gh-pages — live at https://pvnkmnk.github.io/github-stars/"

      - name: Run E2E regression suite (post-deploy)
        run: |
          echo "::group::Installing Playwright"
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium > /dev/null 2>&1
          echo "::endgroup::"
          echo "::group::Running regression suite"
          node tests/e2e-regression.js
          echo "::endgroup::"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deploy or validation failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
