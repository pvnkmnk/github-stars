name: Weekly Star Refresh

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest stars (gh api)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/update_stars.py --fetch-only
        timeout-minutes: 10

      - name: Run regeneration + auto-curation
        run: |
          python3 scripts/update_stars.py --no-fetch --auto-curate

      - name: Check for changes
        id: git-check
        run: |
          git add stars/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will push to main."
          fi

      - name: Commit and push refreshed stars
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "weekly: refresh stars & regenerate guides"
          git push origin HEAD:main

      - name: Trigger deploy
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "::notice::Pushed to main — deploy workflow should auto-trigger at ${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy-gh-pages.yml"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Workflow failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
